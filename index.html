<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Maxmudov 3D шашлык</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
            color: white;
        }
        /* Интерфейс поверх 3D */
        #ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            pointer-events: none;
            z-index: 10;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            flex-wrap: wrap;
            gap: 20px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }
        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, #e8b35c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            backdrop-filter: blur(5px);
            padding: 10px 20px;
            border-radius: 50px;
            border: 1px solid rgba(232,179,92,0.3);
            background: rgba(0,0,0,0.3);
            pointer-events: auto;
        }
        .free-badge {
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(232,179,92,0.4);
            padding: 10px 25px;
            border-radius: 40px;
            color: #e8b35c;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            pointer-events: auto;
        }
        .price-tag {
            position: absolute;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(5px);
            border: 1px solid #e8b35c;
            color: #e8b35c;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 1rem;
            font-weight: 600;
            white-space: nowrap;
            pointer-events: none;
            z-index: 5;
        }
        #order-panel {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(232,179,92,0.3);
            border-radius: 60px;
            padding: 15px 30px;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
            z-index: 20;
            pointer-events: auto;
        }
        .btn {
            background: transparent;
            border: 1.5px solid rgba(255,255,255,0.2);
            color: white;
            padding: 12px 28px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s;
            cursor: pointer;
            pointer-events: auto;
        }
        .btn i {
            color: #e8b35c;
        }
        .btn:hover {
            border-color: #e8b35c;
            background: rgba(232,179,92,0.1);
        }
        .btn-telegram {
            border: 2px solid #e8b35c;
            color: #e8b35c;
        }
        .btn-telegram:hover {
            background: #e8b35c;
            color: black;
        }
        .btn-telegram:hover i {
            color: black;
        }
        #instruction {
            position: absolute;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(4px);
            padding: 6px 20px;
            border-radius: 40px;
            font-size: 0.9rem;
            color: #ccc;
            border: 1px solid rgba(255,255,255,0.1);
            z-index: 15;
        }
        #loading-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0c0e;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            transition: opacity 1s;
        }
        .loader {
            border: 4px solid rgba(232,179,92,0.3);
            border-top-color: #e8b35c;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
    <!-- Шрифты -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,600;14..32,700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div id="loading-screen">
        <div class="loader"></div>
    </div>

    <div id="ui-overlay">
        <div class="logo">maxmudov.com</div>
        <div class="free-badge"><i class="fas fa-truck"></i> доставка по Томску 0₽</div>
    </div>

    <div id="instruction">
        <i class="fas fa-mouse"></i> вращай • <i class="fas fa-search-plus"></i> приближай • кликни по шашлыку для рецепта
    </div>

    <div id="order-panel">
        <a href="https://t.me/+79016106001" class="btn btn-telegram" target="_blank"><i class="fab fa-telegram-plane"></i> Telegram</a>
        <a href="tel:+79016106001" class="btn"><i class="fas fa-phone-alt"></i> +7 (901) 610-60-01</a>
    </div>

    <!-- Подключаем Three.js и дополнения -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';

        // --- Инициализация ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a2b2a); // темный лесной фон
        // Добавляем туман
        scene.fog = new THREE.Fog(0x1a2b2a, 10, 30);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(5, 3, 8);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        // --- Освещение (атмосфера мангала) ---
        // Солнце/луна
        const dirLight = new THREE.DirectionalLight(0xffeedd, 1.2);
        dirLight.position.set(5, 10, 7);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 1024;
        dirLight.shadow.mapSize.height = 1024;
        dirLight.shadow.camera.near = 2;
        dirLight.shadow.camera.far = 20;
        dirLight.shadow.camera.left = -5;
        dirLight.shadow.camera.right = 5;
        dirLight.shadow.camera.top = 5;
        dirLight.shadow.camera.bottom = -5;
        scene.add(dirLight);

        // Теплый свет от мангала
        const fireLight1 = new THREE.PointLight(0xff5500, 1.0, 6);
        fireLight1.position.set(-1, 0.8, 1);
        scene.add(fireLight1);
        const fireLight2 = new THREE.PointLight(0xffaa00, 1.0, 6);
        fireLight2.position.set(1, 0.8, -1);
        scene.add(fireLight2);
        
        // Заполняющий свет
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);

        // --- Контролы ---
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 0.8;
        controls.enableZoom = true;
        controls.maxPolarAngle = Math.PI / 2.2;
        controls.minDistance = 3;
        controls.maxDistance = 15;
        controls.target.set(0, 1, 0);

        // --- Создание сцены с природой и мангалом ---
        
        // Земля с травой (текстура)
        const groundGeometry = new THREE.CircleGeometry(12, 32);
        const groundMaterial = new THREE.MeshStandardMaterial({ color: 0x2a4a3a, roughness: 0.9, emissive: new THREE.Color(0x112211) });
        const ground = new THREE.Mesh(groundGeometry, groundMaterial);
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = -0.1;
        ground.receiveShadow = true;
        scene.add(ground);

        // Костер/мангал
        // Основание из камней
        for (let i = 0; i < 12; i++) {
            const stoneGeo = new THREE.DodecahedronGeometry(0.2 + Math.random()*0.2);
            const stoneMat = new THREE.MeshStandardMaterial({ color: 0x886644, roughness: 0.8 });
            const stone = new THREE.Mesh(stoneGeo, stoneMat);
            const angle = (i / 12) * Math.PI * 2;
            stone.position.set(Math.cos(angle)*1.1, 0.1, Math.sin(angle)*1.1);
            stone.castShadow = true;
            stone.receiveShadow = true;
            scene.add(stone);
        }
        
        // Дрова
        const woodMat = new THREE.MeshStandardMaterial({ color: 0x8B5A2B, roughness: 0.9 });
        for (let i = 0; i < 5; i++) {
            const logGeo = new THREE.CylinderGeometry(0.15, 0.15, 1.2);
            const log = new THREE.Mesh(logGeo, woodMat);
            log.rotation.z = Math.random() * 0.5;
            log.rotation.x = Math.random() * 0.5;
            log.position.set(-0.3 + i*0.15, 0.2, -0.2 + i*0.1);
            log.castShadow = true;
            log.receiveShadow = true;
            scene.add(log);
        }

        // Угли
        const emberMat = new THREE.MeshStandardMaterial({ color: 0xff3300, emissive: new THREE.Color(0x441100) });
        for (let i = 0; i < 15; i++) {
            const emberGeo = new THREE.SphereGeometry(0.05 + Math.random()*0.1, 5);
            const ember = new THREE.Mesh(emberGeo, emberMat);
            ember.position.set(-0.5 + Math.random(), 0.15 + Math.random()*0.2, -0.5 + Math.random());
            ember.castShadow = true;
            ember.receiveShadow = true;
            scene.add(ember);
        }

        // Решетка над мангалом
        const gridGeo = new THREE.BoxGeometry(2.5, 0.05, 1.5);
        const gridMat = new THREE.MeshStandardMaterial({ color: 0xaaaaaa, roughness: 0.4, metalness: 0.7, emissive: new THREE.Color(0x221100) });
        const grid = new THREE.Mesh(gridGeo, gridMat);
        grid.position.set(0, 0.6, 0);
        grid.castShadow = true;
        grid.receiveShadow = true;
        scene.add(grid);

        // --- Создание шашлыков (реалистичные модели) ---
        // Вместо загрузки внешних моделей, создаем составные объекты, максимально похожие на фото
        
        function createChickenSkewer(posX) {
            const group = new THREE.Group();
            const meatColor = 0xffaa66; // куриный цвет
            const specColor = 0xffeedd;
            
            // Шампур
            const skewerGeo = new THREE.CylinderGeometry(0.04, 0.04, 1.8);
            const skewerMat = new THREE.MeshStandardMaterial({ color: 0xcccccc, roughness: 0.2, metalness: 0.8 });
            const skewer = new THREE.Mesh(skewerGeo, skewerMat);
            skewer.rotation.z = Math.PI / 2;
            skewer.position.x = 0;
            skewer.castShadow = true;
            skewer.receiveShadow = true;
            group.add(skewer);
            
            // Куски курицы (неровные, обжаренные)
            for (let i = -0.7; i <= 0.7; i+=0.45) {
                const meatGeo = new THREE.SphereGeometry(0.22, 7);
                const meatMat = new THREE.MeshStandardMaterial({ color: meatColor, roughness: 0.3, emissive: new THREE.Color(0x221100) });
                const meat = new THREE.Mesh(meatGeo, meatMat);
                meat.position.x = i;
                meat.position.y = 0.05 * Math.sin(i*4);
                meat.scale.set(1.1, 0.9, 0.9);
                meat.castShadow = true;
                meat.receiveShadow = true;
                group.add(meat);
            }
            
            // Лук/перец
            const onionMat = new THREE.MeshStandardMaterial({ color: 0xddbb99 });
            for (let i = -0.4; i <= 0.4; i+=0.8) {
                const onionGeo = new THREE.TorusGeometry(0.1, 0.04, 6, 10, Math.PI);
                const onion = new THREE.Mesh(onionGeo, onionMat);
                onion.rotation.y = Math.PI/2;
                onion.rotation.x = 0.2;
                onion.position.x = i;
                onion.position.y = 0.1;
                onion.castShadow = true;
                onion.receiveShadow = true;
                group.add(onion);
            }
            
            group.position.set(posX, 0.8, 0);
            group.userData = { type: 'chicken', price: '500 ₽', recipe: 'Курица: филе бедра, кефир, лук, паприка. Маринад 4ч.' };
            return group;
        }

        function createLambSkewer(posX) {
            const group = new THREE.Group();
            const meatColor = 0xcc5555; // баранина
            
            const skewerGeo = new THREE.CylinderGeometry(0.04, 0.04, 1.8);
            const skewerMat = new THREE.MeshStandardMaterial({ color: 0xcccccc, roughness: 0.2, metalness: 0.8 });
            const skewer = new THREE.Mesh(skewerGeo, skewerMat);
            skewer.rotation.z = Math.PI / 2;
            skewer.position.x = 0;
            skewer.castShadow = true;
            skewer.receiveShadow = true;
            group.add(skewer);
            
            // Куски баранины
            for (let i = -0.7; i <= 0.7; i+=0.5) {
                const meatGeo = new THREE.SphereGeometry(0.23, 6);
                const meatMat = new THREE.MeshStandardMaterial({ color: meatColor, roughness: 0.4, emissive: new THREE.Color(0x331100) });
                const meat = new THREE.Mesh(meatGeo, meatMat);
                meat.position.x = i;
                meat.position.y = 0.1 * Math.sin(i*3);
                meat.scale.set(1.2, 0.8, 0.8);
                meat.castShadow = true;
                meat.receiveShadow = true;
                group.add(meat);
            }
            
            // Жир/специи
            const fatMat = new THREE.MeshStandardMaterial({ color: 0xffdd99 });
            for (let i = -0.5; i <= 0.5; i+=1.0) {
                const fatGeo = new THREE.SphereGeometry(0.08, 5);
                const fat = new THREE.Mesh(fatGeo, fatMat);
                fat.position.x = i;
                fat.position.y = 0.2;
                fat.castShadow = true;
                group.add(fat);
            }
            
            group.position.set(posX, 0.8, 0);
            group.userData = { type: 'lamb', price: '700 ₽', recipe: 'Баранина: мякоть ноги, барбарис, зира, лук. Маринад 6ч.' };
            return group;
        }

        function createBeefSkewer(posX) {
            const group = new THREE.Group();
            const meatColor = 0x884422; // говядина
            
            const skewerGeo = new THREE.CylinderGeometry(0.04, 0.04, 1.8);
            const skewerMat = new THREE.MeshStandardMaterial({ color: 0xcccccc, roughness: 0.2, metalness: 0.8 });
            const skewer = new THREE.Mesh(skewerGeo, skewerMat);
            skewer.rotation.z = Math.PI / 2;
            skewer.position.x = 0;
            skewer.castShadow = true;
            skewer.receiveShadow = true;
            group.add(skewer);
            
            // Крупные куски говядины
            for (let i = -0.7; i <= 0.7; i+=0.55) {
                const meatGeo = new THREE.SphereGeometry(0.24, 8);
                const meatMat = new THREE.MeshStandardMaterial({ color: meatColor, roughness: 0.3, emissive: new THREE.Color(0x221100) });
                const meat = new THREE.Mesh(meatGeo, meatMat);
                meat.position.x = i;
                meat.position.y = 0.1;
                meat.scale.set(1.3, 0.7, 0.7);
                meat.castShadow = true;
                meat.receiveShadow = true;
                group.add(meat);
            }
            
            // Травы
            const herbMat = new THREE.MeshStandardMaterial({ color: 0x33aa33 });
            for (let i = -0.3; i <= 0.3; i+=0.6) {
                const herbGeo = new THREE.ConeGeometry(0.05, 0.1, 4);
                const herb = new THREE.Mesh(herbGeo, herbMat);
                herb.position.x = i;
                herb.position.y = 0.25;
                herb.castShadow = true;
                group.add(herb);
            }
            
            group.position.set(posX, 0.8, 0);
            group.userData = { type: 'beef', price: '750 ₽', recipe: 'Говядина: мраморная вырезка, киви, розмарин. Маринад 2ч.' };
            return group;
        }

        // Размещаем три шампура
        const chicken = createChickenSkewer(-1.5);
        const lamb = createLambSkewer(0);
        const beef = createBeefSkewer(1.5);
        
        scene.add(chicken);
        scene.add(lamb);
        scene.add(beef);

        // Добавляем деревья/кусты для атмосферы
        const treeMat = new THREE.MeshStandardMaterial({ color: 0x3a6b4a });
        const trunkMat = new THREE.MeshStandardMaterial({ color: 0x8B5A2B });
        for (let t = 0; t < 8; t++) {
            const angle = (t / 8) * Math.PI * 2;
            const radius = 4 + Math.random()*2;
            const x = Math.cos(angle) * radius;
            const z = Math.sin(angle) * radius;
            
            const trunkGeo = new THREE.CylinderGeometry(0.2, 0.3, 1.5);
            const trunk = new THREE.Mesh(trunkGeo, trunkMat);
            trunk.position.set(x, 0.7, z);
            trunk.castShadow = true;
            trunk.receiveShadow = true;
            scene.add(trunk);
            
            const foliageGeo = new THREE.ConeGeometry(0.8, 1.2, 6);
            const foliage = new THREE.Mesh(foliageGeo, treeMat);
            foliage.position.set(x, 1.5, z);
            foliage.castShadow = true;
            foliage.receiveShadow = true;
            scene.add(foliage);
        }

        // Дым/пар (частицы)
        const particleCount = 40;
        const particleGeo = new THREE.BufferGeometry();
        const particlePositions = new Float32Array(particleCount * 3);
        for (let i = 0; i < particleCount * 3; i += 3) {
            particlePositions[i] = (Math.random() - 0.5) * 1.5;
            particlePositions[i+1] = Math.random() * 2.5;
            particlePositions[i+2] = (Math.random() - 0.5) * 1.5;
        }
        particleGeo.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
        const particleMat = new THREE.PointsMaterial({ color: 0xcccccc, size: 0.08, transparent: true, opacity: 0.3, blending: THREE.NormalBlending });
        const particles = new THREE.Points(particleGeo, particleMat);
        particles.position.set(0, 0.6, 0);
        scene.add(particles);

        // Звезды/искры
        const starsGeo = new THREE.BufferGeometry();
        const starsPos = new Float32Array(200 * 3);
        for (let i = 0; i < 200 * 3; i += 3) {
            starsPos[i] = (Math.random() - 0.5) * 40;
            starsPos[i+1] = (Math.random() - 0.5) * 20 + 5;
            starsPos[i+2] = (Math.random() - 0.5) * 40;
        }
        starsGeo.setAttribute('position', new THREE.BufferAttribute(starsPos, 3));
        const starsMat = new THREE.PointsMaterial({ color: 0xe8b35c, size: 0.1 });
        const stars = new THREE.Points(starsGeo, starsMat);
        scene.add(stars);

        // --- Рэйкаст для интерактива (клик по шашлыку) ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        
        window.addEventListener('click', (event) => {
            mouse.x = (event.clientX / renderer.domElement.clientWidth) * 2 - 1;
            mouse.y = -(event.clientY / renderer.domElement.clientHeight) * 2 + 1;
            
            raycaster.setFromCamera(mouse, camera);
            
            const objects = [chicken, lamb, beef];
            const intersects = raycaster.intersectObjects(objects, true); // включая потомков
            
            if (intersects.length > 0) {
                // Находим корневую группу с userData
                let obj = intersects[0].object;
                while (obj.parent && !obj.userData?.recipe) {
                    obj = obj.parent;
                }
                if (obj.userData?.recipe) {
                    alert(`🔥 ${obj.userData.type}\n${obj.userData.recipe}\nЦена: ${obj.userData.price}`);
                } else {
                    alert('Сочный шашлык на мангале!');
                }
            }
        });

        // --- Анимация ---
        let clock = new THREE.Clock();
        
        function animate() {
            const delta = clock.getDelta();
            const time = performance.now() * 0.001;
            
            // Анимация огня (мерцание)
            const flicker = Math.sin(time * 8) * 0.2 + 0.8;
            fireLight1.intensity = 0.8 + flicker * 0.3;
            fireLight2.intensity = 0.8 + flicker * 0.3;
            
            // Вращение звезд
            stars.rotation.y += 0.0005;
            
            // Движение частиц дыма
            particles.rotation.y += 0.001;
            
            controls.update();
            renderer.render(scene, camera);
            requestAnimationFrame(animate);
        }
        
        animate();

        // --- Обработка ресайза ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Скрыть загрузочный экран ---
        setTimeout(() => {
            document.getElementById('loading-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('loading-screen').style.display = 'none';
            }, 1000);
        }, 2000);

        // --- Адаптация для мобильных ---
        if (/Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent)) {
            renderer.shadowMap.enabled = false;
            renderer.setPixelRatio(1);
            controls.autoRotate = false;
        }
    </script>
</body>
</html>
