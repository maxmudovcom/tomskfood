<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Maxmudov 3D Шашлык</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Inter', sans-serif; color: white; }
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            padding: 12px 24px;
            border-radius: 40px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(232, 179, 92, 0.3);
            pointer-events: none;
            z-index: 10;
        }
        #info h1 {
            margin: 0;
            font-size: 1.5rem;
            font-weight: 600;
            color: #E8B35C;
        }
        #info p {
            margin: 5px 0 0;
            font-size: 0.9rem;
            opacity: 0.8;
        }
        #loading-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0C0F12;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 20;
            transition: opacity 1s ease;
        }
        .loader {
            color: #E8B35C;
            font-size: 1.5rem;
            border: 3px solid rgba(232,179,92,0.3);
            border-top-color: #E8B35C;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        #instruction {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
            padding: 8px 20px;
            border-radius: 30px;
            font-size: 0.9rem;
            border: 1px solid rgba(255,255,255,0.2);
            pointer-events: none;
            z-index: 10;
        }
    </style>
</head>
<body>
    <div id="loading-screen">
        <div class="loader"></div>
    </div>

    <div id="info">
        <h1>maxmudov.com</h1>
        <p>Шашлык на мангале • 3D презентация</p>
    </div>

    <div id="instruction">
        <i class="fas fa-mouse"></i> Мышь: вращать / колесо: приближать
    </div>

    <!-- Подключаем иконки для инструкции (опционально) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <!-- Подключаем Three.js и OrbitControls -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';

        // --- 1. Инициализация сцены, камеры, рендерера ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0C0F12); // Темный фон как в лендинге
        
        // Добавляем легкую дымку для глубины
        scene.fog = new THREE.Fog(0x0C0F12, 10, 30);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(5, 3, 8); // Устанавливаем камеру для красивого обзора

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true; // Включаем тени для реализма
        renderer.shadowMap.type = THREE.PCFSoftShadowMap; // Мягкие тени
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // Оптимизация для экранов
        document.body.appendChild(renderer.domElement);

        // --- 2. Освещение (атмосферное, как от костра/мангала) ---
        
        // Основной направленный свет (как солнце/луна)
        const directionalLight = new THREE.DirectionalLight(0xffeedd, 1.2);
        directionalLight.position.set(5, 10, 7);
        directionalLight.castShadow = true;
        directionalLight.shadow.mapSize.width = 1024;
        directionalLight.shadow.mapSize.height = 1024;
        const d = 10;
        directionalLight.shadow.camera.left = -d;
        directionalLight.shadow.camera.right = d;
        directionalLight.shadow.camera.top = d;
        directionalLight.shadow.camera.bottom = -d;
        directionalLight.shadow.camera.near = 2;
        directionalLight.shadow.camera.far = 20;
        scene.add(directionalLight);

        // Теплый свет от мангала (снизу)
        const pointLight = new THREE.PointLight(0xE8B35C, 1.5, 10);
        pointLight.position.set(0, 2, 1);
        scene.add(pointLight);

        // Заполняющий свет
        const ambientLight = new THREE.AmbientLight(0x404060); // Холодноватый для контраста
        scene.add(ambientLight);

        // Маленькие огоньки для атмосферы
        const fireLight1 = new THREE.PointLight(0xff5500, 0.8, 5);
        fireLight1.position.set(-0.8, 0.5, 0.5);
        scene.add(fireLight1);
        
        const fireLight2 = new THREE.PointLight(0xffaa00, 0.8, 5);
        fireLight2.position.set(0.8, 0.5, -0.5);
        scene.add(fireLight2);

        // --- 3. Элементы управления (орбита с ограничениями) ---
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true; // Плавное движение
        controls.dampingFactor = 0.05;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 1.0;
        controls.enableZoom = true;
        controls.maxPolarAngle = Math.PI / 2; // Чтобы нельзя было уйти под землю
        controls.minDistance = 3;
        controls.maxDistance = 15;
        controls.target.set(0, 1, 0);

        // --- 4. Анимация камеры (начальный облет) ---
        // Будет выполнена один раз при загрузке через простую анимацию
        let initialAnimation = true;
        const initialCameraPos = camera.position.clone();
        const targetCameraPos = new THREE.Vector3(5, 3, 8);
        
        // --- 5. Создание простой сцены с геометрией (как замена 3D-модели) ---
        // В реальном проекте здесь будет загрузка GLTF с оптимизированными моделями
        
        // Земля/подиум
        const groundGeometry = new THREE.CircleGeometry(5, 32);
        const groundMaterial = new THREE.MeshStandardMaterial({ color: 0x2a2a2a, roughness: 0.8, metalness: 0.2 });
        const ground = new THREE.Mesh(groundGeometry, groundMaterial);
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = 0;
        ground.receiveShadow = true;
        scene.add(ground);

        // Мангал (простая конструкция)
        const grillBaseGeo = new THREE.BoxGeometry(2.5, 0.2, 1.5);
        const grillBaseMat = new THREE.MeshStandardMaterial({ color: 0x555555, roughness: 0.7, metalness: 0.8 });
        const grillBase = new THREE.Mesh(grillBaseGeo, grillBaseMat);
        grillBase.position.set(0, 0.1, 0);
        grillBase.castShadow = true;
        grillBase.receiveShadow = true;
        scene.add(grillBase);

        // Ножки мангала
        const legGeo = new THREE.CylinderGeometry(0.1, 0.15, 0.3);
        const legMat = new THREE.MeshStandardMaterial({ color: 0x333333, roughness: 0.4, metalness: 0.9 });
        const positions = [[-1.0, 0.25, 0.6], [1.0, 0.25, 0.6], [-1.0, 0.25, -0.6], [1.0, 0.25, -0.6]];
        positions.forEach(pos => {
            const leg = new THREE.Mesh(legGeo, legMat);
            leg.position.set(pos[0], pos[1], pos[2]);
            leg.castShadow = true;
            leg.receiveShadow = true;
            scene.add(leg);
        });

        // Решетка
        const grillGridGeo = new THREE.BoxGeometry(2.3, 0.05, 1.3);
        const grillGridMat = new THREE.MeshStandardMaterial({ color: 0x888888, roughness: 0.3, metalness: 0.9, emissive: new THREE.Color(0x331100) });
        const grillGrid = new THREE.Mesh(grillGridGeo, grillGridMat);
        grillGrid.position.set(0, 0.3, 0);
        grillGrid.castShadow = true;
        grillGrid.receiveShadow = true;
        scene.add(grillGrid);

        // Угли (несколько сфер)
        const emberMat = new THREE.MeshStandardMaterial({ color: 0xff6600, emissive: new THREE.Color(0x441100) });
        for (let i = 0; i < 8; i++) {
            const emberGeo = new THREE.SphereGeometry(0.1 + Math.random()*0.1, 6);
            const ember = new THREE.Mesh(emberGeo, emberMat);
            ember.position.set(-0.8 + i*0.25, 0.2, -0.4 + Math.random()*0.8);
            ember.castShadow = true;
            ember.receiveShadow = true;
            scene.add(ember);
        }

        // Шашлык (основной объект) - составная модель, чтобы продемонстрировать оптимизацию и центры мешей
        function createShashlik(meatColor, posX, recipeName) {
            const group = new THREE.Group();
            
            // Шампур
            const skewerGeo = new THREE.CylinderGeometry(0.04, 0.04, 1.5);
            const skewerMat = new THREE.MeshStandardMaterial({ color: 0xcccccc, roughness: 0.2, metalness: 0.7 });
            const skewer = new THREE.Mesh(skewerGeo, skewerMat);
            skewer.rotation.z = Math.PI / 2;
            skewer.position.x = 0;
            skewer.castShadow = true;
            skewer.receiveShadow = true;
            group.add(skewer);
            
            // Куски мяса (3 шт.)
            for (let i = -0.6; i <= 0.6; i+=0.6) {
                const meatGeo = new THREE.SphereGeometry(0.22, 12);
                const meatMat = new THREE.MeshStandardMaterial({ color: meatColor, roughness: 0.5, emissive: new THREE.Color(0x221100) });
                const meat = new THREE.Mesh(meatGeo, meatMat);
                meat.position.x = i + (Math.random()*0.1);
                meat.position.y = 0.1 * Math.sin(i*3);
                meat.castShadow = true;
                meat.receiveShadow = true;
                group.add(meat);
            }
            
            // Лук/овощи между мясом
            for (let i = -0.3; i <= 0.3; i+=0.6) {
                const onionGeo = new THREE.TorusGeometry(0.1, 0.04, 8, 12, Math.PI);
                const onionMat = new THREE.MeshStandardMaterial({ color: 0xddbb99, roughness: 0.8 });
                const onion = new THREE.Mesh(onionGeo, onionMat);
                onion.rotation.y = Math.PI/2;
                onion.position.x = i;
                onion.position.y = 0.1;
                onion.castShadow = true;
                onion.receiveShadow = true;
                group.add(onion);
            }
            
            group.position.set(posX, 0.5, 0);
            
            // Добавляем свойство с рецептом для интерактива
            group.userData = { recipe: recipeName };
            
            return group;
        }

        // Создаем три шампура с разным мясом
        const chicken = createShashlik(0xffaa66, -1.2, 'Курица: филе бедра, кефир, лук, паприка. Маринад 4ч.');
        const lamb = createShashlik(0xcc5555, 0, 'Баранина: мякоть ноги, луковый сок, барбарис, зира. Маринад 6ч.');
        const beef = createShashlik(0x884422, 1.2, 'Говядина: мраморная вырезка, киви, минералка, розмарин. Маринад 2ч.');

        scene.add(chicken);
        scene.add(lamb);
        scene.add(beef);

        // Добавляем звезды/искры для атмосферы (мелкие частицы)
        const starsGeo = new THREE.BufferGeometry();
        const starsCount = 200;
        const starsPos = new Float32Array(starsCount * 3);
        for (let i = 0; i < starsCount * 3; i += 3) {
            starsPos[i] = (Math.random() - 0.5) * 30;
            starsPos[i+1] = (Math.random() - 0.5) * 15 + 2;
            starsPos[i+2] = (Math.random() - 0.5) * 30;
        }
        starsGeo.setAttribute('position', new THREE.BufferAttribute(starsPos, 3));
        const starsMat = new THREE.PointsMaterial({ color: 0xE8B35C, size: 0.05, transparent: true, opacity: 0.6 });
        const stars = new THREE.Points(starsGeo, starsMat);
        scene.add(stars);

        // --- 6. Прогрессивная загрузка и скрытие прелоадера ---
        setTimeout(() => {
            document.getElementById('loading-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('loading-screen').style.display = 'none';
            }, 1000);
        }, 2000); // Имитация загрузки 2 сек. В реальном проекте прелоадер скрывается после загрузки всех моделей.

        // --- 7. Интерактивность: Raycaster для кликов по объектам ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        
        window.addEventListener('click', (event) => {
            // Нормализуем координаты мыши
            mouse.x = (event.clientX / renderer.domElement.clientWidth) * 2 - 1;
            mouse.y = -(event.clientY / renderer.domElement.clientHeight) * 2 + 1;
            
            raycaster.setFromCamera(mouse, camera);
            
            // Проверяем пересечения с нашими шампурами
            const intersects = raycaster.intersectObjects([chicken, lamb, beef], true); // true для проверки потомков
            
            if (intersects.length > 0) {
                // Находим корневую группу объекта
                let obj = intersects[0].object;
                while (obj.parent && !obj.userData.recipe) {
                    obj = obj.parent;
                }
                
                if (obj.userData.recipe) {
                    alert(`🔥 Рецепт: ${obj.userData.recipe}`);
                } else {
                    // Fallback, если рецепт не найден
                    alert('🧂 Сочный шашлык на мангале!');
                }
            }
        });

        // --- 8. Оптимизация: Упрощение для мобильных устройств (снижение качества теней и т.д.) ---
        if (/Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent)) {
            renderer.shadowMap.enabled = false; // Отключаем тени для производительности
            renderer.setPixelRatio(1);
            controls.autoRotate = false; // Отключаем авто-поворот на мобильных
        }

        // --- 9. Анимация ---
        let clock = new THREE.Clock();

        function animate() {
            const delta = clock.getDelta();
            const elapsedTime = performance.now() * 0.001; // seconds

            // Вращаем звезды
            stars.rotation.y += 0.0005;

            // Анимируем свет от углей (мерцание)
            const flicker = Math.sin(elapsedTime * 10) * 0.1 + 0.9;
            fireLight1.intensity = 0.6 + flicker * 0.3;
            fireLight2.intensity = 0.6 + flicker * 0.3;
            pointLight.intensity = 1.2 + flicker * 0.4;

            // Авто-поворот камеры через controls
            controls.update();

            renderer.render(scene, camera);
            requestAnimationFrame(animate);
        }

        animate();

        // --- 10. Обработка изменения размера окна (адаптивность) ---
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        console.log('3D Сцена успешно загружена!');
    </script>
</body>
</html>
