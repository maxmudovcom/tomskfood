  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: #0a0c0e;
      color: white;
      overflow: hidden;
      position: fixed;
      width: 100%;
      height: 100%;
    }

    #app {
      width: 100vw;
      height: 100vh;
      position: relative;
    }

    /* Интерфейс поверх 3D */
    #ui-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      pointer-events: none;
      z-index: 20;
      padding: 24px 32px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      flex-wrap: wrap;
      gap: 20px;
      text-shadow: 0 2px 10px rgba(0,0,0,0.5);

    .logo {

    #order-panel {
      position: absolute;
      bottom: 40px;

      transform: translateX(-50%);
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(232,179,92,0.3);
      border-radius: 80px;
      padding: 16px 32px;
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
      justify-content: center;
      z-index: 30;
      pointer-events: auto;
      box-shadow: 0 15px 40px rgba(0,0,0,0.6);
    }

    .btn {
      background: transparent;
      border: 1.5px solid rgba(255,255,255,0.2);
      color: white;
      padding: 14px 36px;
      border-radius: 50px;
      text-decoration: none;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 12px;
      transition: all 0.3s ease;
      cursor: pointer;
      font-size: 1.1rem;
      letter-spacing: 0.3px;
    }

    .btn i {
      color: #e8b35c;
      font-size: 1.3rem;
      transition: all 0.3s;
    }

    .btn:hover {
      border-color: #e8b35c;
      background: rgba(232,179,92,0.1);
      transform: scale(1.05);
    }

    .btn-telegram {
      border: 2px solid #e8b35c;
      color: #e8b35c;
    }

    .btn-telegram:hover {
      background: #e8b35c;
      color: #0a0c0e;
    }

    .btn-telegram:hover i {
      color: #0a0c0e;
    }

    #instruction {
      position: absolute;
      bottom: 130px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.3);
      backdrop-filter: blur(8px);
      padding: 10px 28px;
      border-radius: 40px;
      font-size: 1rem;
      color: rgba(255,255,255,0.9);
      border: 1px solid rgba(255,255,255,0.15);
      z-index: 25;
      white-space: nowrap;
    }

    #instruction i {
      color: #e8b35c;
      margin: 0 4px;
    }

    #loading-screen {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #0a2a1a;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 100;
      transition: opacity 1s ease;
      flex-direction: column;
      gap: 24px;
    }

    .loader {
      border: 5px solid rgba(232,179,92,0.2);
      border-top-color: #e8b35c;
      border-radius: 50%;
      width: 80px;
      height: 80px;
      animation: spin 1s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-text {
      color: #e8b35c;
      font-size: 1.4rem;
      font-weight: 500;
      letter-spacing: 2px;
    }

    #orientation {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #0a0c0e;
      z-index: 200;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 30px;
      color: white;
      text-align: center;
      padding: 20px;
    }

    #orientation svg {
      width: 80px;
      height: 80px;
      fill: #e8b35c;
    }

    #orientation p {
      font-size: 1.3rem;
      color: #aaa;
    }

    .orientation__portrait, .orientation__landscape {
      color: #e8b35c;
      font-weight: 600;
    }

    @media (orientation: portrait) {
      #orientation {
        display: flex;
      }
      #app {
        display: none;
      }
    }
  </style>

  <div id="instruction">
    <i class="fas fa-mouse"></i> вращай · <i class="fas fa-search-plus"></i> приближай · кликни по шашлыку

  <div id="order-panel">

  <!-- Three.js скрипт с 3D сценой -->
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // --- Инициализация ---
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87CEEB); // небо
    
    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(6, 3, 8);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.2;
    document.getElementById('app').appendChild(renderer.domElement);

    // --- Освещение ---
    const sunLight = new THREE.DirectionalLight(0xfff5e6, 1.5);
    sunLight.position.set(10, 20, 5);
    sunLight.castShadow = true;
    sunLight.shadow.mapSize.width = 2048;
    sunLight.shadow.mapSize.height = 2048;
    sunLight.shadow.camera.near = 0.5;
    sunLight.shadow.camera.far = 40;
    sunLight.shadow.camera.left = -10;
    sunLight.shadow.camera.right = 10;
    sunLight.shadow.camera.top = 10;
    sunLight.shadow.camera.bottom = -10;
    scene.add(sunLight);

    const ambientLight = new THREE.AmbientLight(0x404c60, 0.8);
    scene.add(ambientLight);

    const fireLight1 = new THREE.PointLight(0xff6600, 1.2, 8);
    fireLight1.position.set(-0.8, 1.0, 0.5);
    scene.add(fireLight1);
    
    const fireLight2 = new THREE.PointLight(0xffaa00, 1.2, 8);
    fireLight2.position.set(0.8, 1.0, -0.5);
    scene.add(fireLight2);

    // --- Контролы ---
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.autoRotate = true;
    controls.autoRotateSpeed = 0.5;
    controls.enableZoom = true;
    controls.maxPolarAngle = Math.PI / 2.3;
    controls.minDistance = 3;
    controls.maxDistance = 15;
    controls.target.set(0, 1.2, 0);

    // --- Природа ---
    // Трава
    const grassCanvas = document.createElement('canvas');
    grassCanvas.width = 512;
    grassCanvas.height = 512;
    const ctx = grassCanvas.getContext('2d');
    ctx.fillStyle = '#3a6b2a';
    ctx.fillRect(0, 0, 512, 512);
    for (let i = 0; i < 5000; i++) {
      ctx.fillStyle = i % 2 === 0 ? '#4a8b3a' : '#2a5a1a';
      ctx.fillRect(Math.random()*512, Math.random()*512, 2, 8);
    }
    const grassTexture = new THREE.CanvasTexture(grassCanvas);
    
    const groundGeo = new THREE.CircleGeometry(20, 64);
    const groundMat = new THREE.MeshStandardMaterial({ map: grassTexture, roughness: 0.9 });
    const ground = new THREE.Mesh(groundGeo, groundMat);
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = -0.1;
    ground.receiveShadow = true;
    scene.add(ground);

    // Деревья
    function createTree(x, z) {
      const group = new THREE.Group();
      const trunkMat = new THREE.MeshStandardMaterial({ color: 0x8B5A2B, roughness: 0.8 });
      const trunkGeo = new THREE.CylinderGeometry(0.3, 0.5, 2.2, 8);
      const trunk = new THREE.Mesh(trunkGeo, trunkMat);
      trunk.position.y = 1.1;
      trunk.castShadow = true;
      trunk.receiveShadow = true;
      group.add(trunk);
      
      const leafMat = new THREE.MeshStandardMaterial({ color: 0x2a7a2a, roughness: 0.4 });
      const leafGeo1 = new THREE.ConeGeometry(0.9, 1.2, 6);
      const leaf1 = new THREE.Mesh(leafGeo1, leafMat);
      leaf1.position.y = 1.8;
      leaf1.castShadow = true;
      leaf1.receiveShadow = true;
      group.add(leaf1);
      
      const leafGeo2 = new THREE.ConeGeometry(0.7, 1.0, 6);
      const leaf2 = new THREE.Mesh(leafGeo2, leafMat);
      leaf2.position.y = 2.5;
      leaf2.castShadow = true;
      leaf2.receiveShadow = true;
      group.add(leaf2);
      
      group.position.set(x, 0, z);
      return group;
    }

    for (let i = 0; i < 12; i++) {
      const angle = (i / 12) * Math.PI * 2;
      const radius = 5 + Math.random() * 3;
      const x = Math.cos(angle) * radius;
      const z = Math.sin(angle) * radius;
      scene.add(createTree(x, z));
    }

    // Мангал
    const stoneMat = new THREE.MeshStandardMaterial({ color: 0x886644, roughness: 0.9 });
    for (let i = 0; i < 8; i++) {
      const stoneGeo = new THREE.DodecahedronGeometry(0.25 + Math.random()*0.2);
      const stone = new THREE.Mesh(stoneGeo, stoneMat);
      const angle = (i / 8) * Math.PI * 2;
      stone.position.set(Math.cos(angle)*1.2, 0.1, Math.sin(angle)*1.2);
      stone.castShadow = true;
      stone.receiveShadow = true;
      scene.add(stone);
    }

    const gridMat = new THREE.MeshStandardMaterial({ color: 0xaaaaaa, roughness: 0.3, metalness: 0.9, emissive: new THREE.Color(0x221100) });
    const gridGeo = new THREE.BoxGeometry(2.4, 0.05, 1.4);
    const grid = new THREE.Mesh(gridGeo, gridMat);
    grid.position.set(0, 0.65, 0);
    grid.castShadow = true;
    grid.receiveShadow = true;
    scene.add(grid);

    // Угли
    const emberMat = new THREE.MeshStandardMaterial({ color: 0xff4400, emissive: new THREE.Color(0x441100) });
    for (let i = 0; i < 20; i++) {
      const emberGeo = new THREE.SphereGeometry(0.05 + Math.random()*0.1, 4);
      const ember = new THREE.Mesh(emberGeo, emberMat);
      ember.position.set(-0.8 + Math.random()*1.6, 0.2, -0.6 + Math.random()*1.2);
      ember.castShadow = true;
      ember.receiveShadow = true;
      scene.add(ember);
    }

    // --- Шашлыки (реалистичные) ---
    function createMeatPiece(color, posX, posY) {
      const meatGeo = new THREE.SphereGeometry(0.22, 16);
      // Текстура мяса
      const canvas = document.createElement('canvas');
      canvas.width = 64;
      canvas.height = 64;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = '#' + color.toString(16).padStart(6, '0');
      ctx.fillRect(0, 0, 64, 64);
      ctx.fillStyle = '#442200';
      for (let i=0; i<20; i++) {
        ctx.fillRect(Math.random()*64, Math.random()*64, 4, 4);
      }
      const texture = new THREE.CanvasTexture(canvas);
      
      const meatMat = new THREE.MeshStandardMaterial({ map: texture, roughness: 0.4, emissive: new THREE.Color(0x221100) });
      const meat = new THREE.Mesh(meatGeo, meatMat);
      meat.position.set(posX, posY, 0);
      meat.scale.set(1.0, 0.8, 0.8);
      meat.castShadow = true;
      meat.receiveShadow = true;
      return meat;
    }

    function createSkewer(posX, meatColor, price, recipe) {
      const group = new THREE.Group();
      
      const skewerGeo = new THREE.CylinderGeometry(0.04, 0.04, 2.0);
      const skewerMat = new THREE.MeshStandardMaterial({ color: 0xcccccc, roughness: 0.2, metalness: 0.9 });
      const skewer = new THREE.Mesh(skewerGeo, skewerMat);
      skewer.rotation.z = Math.PI / 2;
      skewer.position.x = 0;
      skewer.castShadow = true;
      skewer.receiveShadow = true;
      group.add(skewer);
      
      const positions = [-0.7, -0.2, 0.3, 0.7];
      positions.forEach((x, i) => {
        group.add(createMeatPiece(meatColor, x, 0.1));
      });
      
      const vegMat = new THREE.MeshStandardMaterial({ color: 0xddbb99 });
      const onionPos = [-0.45, 0.15, 0.55];
      onionPos.forEach(x => {
        const onionGeo = new THREE.TorusGeometry(0.1, 0.04, 6, 10, Math.PI);
        const onion = new THREE.Mesh(onionGeo, vegMat);
        onion.rotation.y = Math.PI/2;
        onion.rotation.x = 0.2;
        onion.position.set(x, 0.15, 0);
        onion.castShadow = true;
        onion.receiveShadow = true;
        group.add(onion);
      });
      
      group.position.set(posX, 0.9, 0);
      group.userData = { price, recipe };
      return group;
    }

    const chicken = createSkewer(-1.5, 0xffaa66, '500 ₽', 'Курица: филе бедра, кефир, лук, паприка');
    const lamb = createSkewer(0, 0xcc5555, '700 ₽', 'Баранина: мякоть, барбарис, зира, лук');
    const beef = createSkewer(1.5, 0x884422, '750 ₽', 'Говядина: мраморная, киви, розмарин');

    scene.add(chicken);
    scene.add(lamb);
    scene.add(beef);

    // Дым
    const particleCount = 60;
    const particleGeo = new THREE.BufferGeometry();
    const particlePos = new Float32Array(particleCount * 3);
    for (let i = 0; i < particleCount * 3; i += 3) {
      particlePos[i] = (Math.random() - 0.5) * 2;
      particlePos[i+1] = Math.random() * 2.5;
      particlePos[i+2] = (Math.random() - 0.5) * 1.5;
    }
    particleGeo.setAttribute('position', new THREE.BufferAttribute(particlePos, 3));
    const particleMat = new THREE.PointsMaterial({ color: 0xeeeeee, size: 0.1, transparent: true, opacity: 0.3 });
    const particles = new THREE.Points(particleGeo, particleMat);
    particles.position.set(0, 0.8, 0);
    scene.add(particles);

    // Небо
    const skyMat = new THREE.MeshStandardMaterial({ color: 0x87CEEB, emissive: new THREE.Color(0x224466), side: THREE.BackSide });
    const skyGeo = new THREE.SphereGeometry(50, 32, 16);
    const sky = new THREE.Mesh(skyGeo, skyMat);
    scene.add(sky);

    // --- Интерактивность ---
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();
    
    window.addEventListener('click', (event) => {
      mouse.x = (event.clientX / renderer.domElement.clientWidth) * 2 - 1;
      mouse.y = -(event.clientY / renderer.domElement.clientHeight) * 2 + 1;
      
      raycaster.setFromCamera(mouse, camera);
      
      const objects = [chicken, lamb, beef];
      const intersects = raycaster.intersectObjects(objects, true);
      
      if (intersects.length > 0) {
        let obj = intersects[0].object;
        while (obj.parent && !obj.parent.userData?.price) {
          obj = obj.parent;
        }
        if (obj.parent?.userData?.price) {
          alert(`🔥 Шашлык\n${obj.parent.userData.recipe}\nЦена: ${obj.parent.userData.price}`);
        }
      }
    });

    // --- Анимация ---
    let clock = new THREE.Clock();
    
    function animate() {
      const delta = clock.getDelta();
      const time = performance.now() * 0.001;
      
      const flicker = Math.sin(time * 10) * 0.2 + 0.8;
      fireLight1.intensity = 1.0 + flicker * 0.4;
      fireLight2.intensity = 1.0 + flicker * 0.4;
      
      particles.rotation.y += 0.002;
      
      controls.update();
      renderer.render(scene, camera);
      requestAnimationFrame(animate);
    }
    
    animate();

    // --- Ресайз ---
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // --- Скрыть загрузку ---
    setTimeout(() => {
      document.getElementById('loading-screen').style.opacity = '0';
      setTimeout(() => {
        document.getElementById('loading-screen').style.display = 'none';
      }, 1000);
    }, 2500);
  </script>
